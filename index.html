<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>언제만날래</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --pk:#FF375F;
  --pk-lt:rgba(255,55,95,.09);
  --bg:#F2F2F7;
  --surface:#FFFFFF;
  --s3:rgba(118,118,128,.12);
  --s4:rgba(118,118,128,.06);
  --lbl:#000;
  --lbl2:rgba(60,60,67,.6);
  --lbl3:rgba(60,60,67,.3);
  --sep:rgba(60,60,67,.12);
  --blue:#007AFF;
  --green:#34C759;
  --purple:#AF52DE;
  --f:-apple-system,'Gothic A1',sans-serif;
}
html,body{height:100%;background:var(--bg)}
body{font-family:var(--f);color:var(--lbl);display:flex;justify-content:center}
.app{max-width:430px;width:100%;min-height:100vh;background:var(--bg);display:flex;flex-direction:column}

/* NAV */
.nav{background:rgba(242,242,247,.94);backdrop-filter:saturate(180%) blur(24px);-webkit-backdrop-filter:saturate(180%) blur(24px);padding:54px 20px 10px;position:sticky;top:0;z-index:50;border-bottom:.5px solid var(--sep)}
.nav-row{display:flex;align-items:center;justify-content:space-between}
.logo{font-size:26px;font-weight:800;letter-spacing:-1.2px;color:var(--pk);line-height:1}
.logo em{font-style:normal;color:var(--pk)}
.nav-btns{display:flex;gap:7px}
.nb{height:30px;padding:0 12px;background:var(--s3);border:none;border-radius:15px;font-size:13px;font-family:var(--f);font-weight:600;cursor:pointer;color:var(--blue)}
.nb:active{opacity:.5}
.nb.red{background:var(--pk);color:#fff}
.bc{display:flex;align-items:center;gap:3px;margin-top:7px;min-height:18px}
.bc-i{font-size:13px;font-weight:500;color:var(--blue);cursor:pointer}
.bc-i.on{color:var(--lbl2);cursor:default}
.bc-s{font-size:13px;color:var(--lbl3)}

/* PAGES */
.page{display:none;padding:16px 16px 52px;overflow-y:auto}
.page.active{display:block}
.sh{font-size:12px;font-weight:600;color:var(--lbl2);text-transform:uppercase;letter-spacing:.6px;margin:22px 4px 8px}
.sh:first-child{margin-top:4px}

/* MEMBERS */
.mrow{display:flex;gap:6px;overflow-x:auto;padding:0 0 2px;scrollbar-width:none}
.mrow::-webkit-scrollbar{display:none}
.mp{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex-shrink:0;padding:8px 8px 6px;border-radius:14px;min-width:60px}
.mp:active{opacity:.5}
.mp.on{background:var(--surface)}
.av{width:48px;height:48px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:23px}
.mp.on .av{box-shadow:0 0 0 2.5px var(--pk);background:var(--pk-lt)}
.mn{font-size:11px;font-weight:600;color:var(--lbl2)}
.mp.on .mn{color:var(--pk);font-weight:700}
.madd{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex-shrink:0;padding:8px 8px 6px;border-radius:14px;min-width:60px}
.madd:active{opacity:.5}
.madd-ic{width:48px;height:48px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--blue);font-weight:300}
.madd-n{font-size:11px;font-weight:600;color:var(--blue)}

/* CALENDAR */
.cal{background:var(--surface);border-radius:16px}
.cal-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 12px}
.cal-lbl{font-size:21px;font-weight:700;letter-spacing:-.5px}
.cal-navs{display:flex;gap:4px}
.cnav{width:32px;height:32px;border:none;background:var(--s3);border-radius:50%;font-size:14px;cursor:pointer;color:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:500}
.cnav:active{opacity:.5}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);padding:0 10px 6px}
.dow{font-size:12px;font-weight:600;text-align:center;color:var(--lbl3)}
.dgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 10px 16px}

/* CELL — larger */
.cc{display:flex;flex-direction:column;align-items:center;padding:5px 1px 5px;cursor:pointer;border-radius:10px;min-height:66px}
.cc:active:not(.emp){background:var(--s3)}
.cc.emp{cursor:default}
.dnw{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:3px}
.dn{font-size:14px;font-weight:500;color:var(--lbl)}
.cc.tod .dnw{background:var(--pk)}
.cc.tod .dn{color:#fff;font-weight:700}
.cc.all .dnw{background:var(--green)}
.cc.all .dn{color:#fff;font-weight:700}
.cc.pf .dnw{background:var(--purple)}
.cc.pf .dn{color:#fff}
.ddots{display:flex;flex-wrap:wrap;justify-content:center;gap:1px;max-width:38px}
.ddot{font-size:11px;line-height:1.1}
.ptag{font-size:8px;font-weight:700;color:var(--purple);text-align:center;max-width:38px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-top:1px}

/* LIST */
.lg{background:var(--surface);border-radius:16px;overflow:hidden}
.lr{display:flex;align-items:center;padding:12px 16px;min-height:50px;cursor:pointer;position:relative}
.lr:active{background:var(--s4)}
.lr+.lr::before{content:'';position:absolute;top:0;left:16px;right:0;height:.5px;background:var(--sep)}
.li{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;margin-right:13px;flex-shrink:0}
.ig{background:#34C75916}.ib{background:#007AFF16}.ip{background:#AF52DE16}
.lm{flex:1;min-width:0}
.lt{font-size:16px;font-weight:500;color:var(--lbl)}
.ls{font-size:13px;color:var(--lbl2);margin-top:1px}
.lr-r{display:flex;align-items:center;gap:5px;flex-shrink:0}
.ejs{display:flex;gap:1px;font-size:14px}
.bdg{font-size:12px;font-weight:600;padding:2px 9px;border-radius:10px;color:#fff;white-space:nowrap}
.bg{background:var(--green)}.bp{background:var(--purple)}.br{background:var(--pk)}
.cv{font-size:14px;color:var(--lbl3)}
.le{padding:22px;text-align:center;font-size:14px;color:var(--lbl3)}
.ab{font-size:12px;font-weight:600;padding:5px 11px;border-radius:12px;border:none;cursor:pointer;white-space:nowrap}
.ab:active{opacity:.55}

/* PLACE BANNER */
.cbar{background:var(--pk);border-radius:16px;padding:14px 18px;margin-bottom:16px}
.ceye{font-size:11px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:4px}
.cdt{font-size:24px;font-weight:800;color:#fff;letter-spacing:-.5px}

/* BACK */
.back{display:inline-flex;align-items:center;gap:3px;font-size:16px;font-weight:500;color:var(--blue);cursor:pointer;margin-bottom:14px;padding:4px 0}
.back:active{opacity:.5}

/* PROFILE */
.pg{background:var(--surface);border-radius:16px;overflow:hidden}
.pr{display:flex;align-items:center;padding:12px 16px;position:relative}
.pr+.pr::before{content:'';position:absolute;top:0;left:74px;right:0;height:.5px;background:var(--sep)}
.pav{width:46px;height:46px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:24px;margin-right:14px;flex-shrink:0}
.pi{flex:1;min-width:0}
.pn{font-size:16px;font-weight:600;color:var(--lbl)}
.pa{font-size:13px;color:var(--lbl2);margin-top:1px}
.pdel{width:22px;height:22px;border-radius:50%;background:var(--pk);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:10px;font-weight:700;border:none;flex-shrink:0}
.pdel:active{opacity:.6}

/* ADD ROW */
.arow{display:flex;align-items:center;padding:14px 16px;cursor:pointer;background:var(--surface);border-radius:16px}
.arow:active{opacity:.6}
.aic{width:28px;height:28px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;margin-right:13px;line-height:1;font-weight:300}
.albl{font-size:16px;font-weight:500;color:var(--lbl)}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:100;align-items:flex-end;justify-content:center}
.mo.open{display:flex}
.ms{background:var(--surface);width:100%;max-width:430px;max-height:92vh;overflow-y:auto;border-radius:13px 13px 0 0}
.mhnd{width:36px;height:5px;background:rgba(60,60,67,.18);border-radius:3px;margin:10px auto 0}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px}
.mtit{font-size:17px;font-weight:700;color:var(--lbl)}
.mact{font-size:16px;font-weight:400;color:var(--blue);background:none;border:none;cursor:pointer;padding:0}
.mact:active{opacity:.5}
.mbod{padding:0 20px 36px}
.fg{background:var(--bg);border-radius:12px;overflow:hidden;margin-bottom:14px}
.ff{display:flex;align-items:center;padding:13px 15px;position:relative}
.ff+.ff::before{content:'';position:absolute;top:0;left:15px;right:0;height:.5px;background:var(--sep)}
.fl{font-size:13px;font-weight:600;color:var(--lbl2);width:54px;flex-shrink:0}
.fi{flex:1;border:none;outline:none;background:transparent;font-size:16px;font-family:var(--f);color:var(--lbl)}
.fi::placeholder{color:var(--lbl3)}
.ef{display:flex;align-items:center;gap:14px;padding:12px 15px}
.ep{font-size:34px;width:46px;text-align:center}
.ei{flex:1;border:none;outline:none;background:transparent;font-size:26px;font-family:var(--f)}
.fh{font-size:12px;color:var(--lbl3);padding:2px 4px 10px}
</style>
</head>
<body>
<div class="app">

  <div class="nav">
    <div class="nav-row">
      <div class="logo">언제<em>만날래!</em></div>
      <div class="nav-btns" id="navBtns">
        <button class="nb" onclick="showPage('profile')">멤버</button>
        <button class="nb red" onclick="openModal('addProfile')">+ 추가</button>
      </div>
    </div>
    <div class="bc" id="breadcrumb"></div>
  </div>

  <div class="page active" id="page-home">
    <div class="sh">멤버 선택</div>
    <div class="mrow" id="membersRow"></div>
    <div class="sh">날짜 투표</div>
    <div class="cal">
      <div class="cal-hd">
        <div class="cal-lbl" id="calLbl"></div>
        <div class="cal-navs">
          <button class="cnav" onclick="changeMonth(-1)">&#8592;</button>
          <button class="cnav" onclick="changeMonth(1)">&#8594;</button>
        </div>
      </div>
      <div class="dow-row" id="dowRow"></div>
      <div class="dgrid" id="daysGrid"></div>
    </div>
    <div class="sh">투표 현황</div>
    <div class="lg" id="voteList"></div>
  </div>

  <div class="page" id="page-place">
    <div class="back" onclick="showPage('home')">&#8249; 캘린더</div>
    <div class="cbar">
      <div class="ceye">확정 날짜</div>
      <div class="cdt" id="cdtLbl">—</div>
    </div>
    <div class="sh">장소 제안 및 투표</div>
    <div class="lg" id="proposalsList"></div>
    <div style="height:12px"></div>
    <div class="arow" onclick="openModal('addPlace')">
      <div class="aic">+</div><div class="albl">장소 제안하기</div>
    </div>
  </div>

  <div class="page" id="page-profile">
    <div class="back" onclick="showPage('home')">&#8249; 캘린더</div>
    <div class="sh">멤버</div>
    <div class="pg" id="profileList"></div>
    <div style="height:12px"></div>
    <div class="arow" onclick="openModal('addProfile')">
      <div class="aic">+</div><div class="albl">멤버 추가</div>
    </div>
  </div>

</div>

<div class="mo" id="modal-addProfile">
  <div class="ms">
    <div class="mhnd"></div>
    <div class="mhdr">
      <button class="mact" onclick="closeModal('addProfile')">취소</button>
      <div class="mtit">멤버 추가</div>
      <button class="mact" style="font-weight:700;color:var(--pk)" onclick="addProfile()">완료</button>
    </div>
    <div class="mbod">
      <div class="fg">
        <div class="ff"><div class="fl">이름</div><input class="fi" id="inp-name" placeholder="홍길동"></div>
        <div class="ff"><div class="fl">지역</div><input class="fi" id="inp-addr" placeholder="용산"></div>
      </div>
      <div class="fg">
        <div class="ef">
          <div class="ep" id="emojiPreview">😊</div>
          <input class="ei" id="inp-emoji" maxlength="2" placeholder="😊" oninput="updateEP()">
        </div>
      </div>
      <div class="fh">이모지를 탭하거나 키보드에서 직접 선택하세요</div>
    </div>
  </div>
</div>

<div class="mo" id="modal-addPlace">
  <div class="ms">
    <div class="mhnd"></div>
    <div class="mhdr">
      <button class="mact" onclick="closeModal('addPlace')">취소</button>
      <div class="mtit">장소 제안</div>
      <button class="mact" style="font-weight:700;color:var(--pk)" onclick="addProposal()">완료</button>
    </div>
    <div class="mbod">
      <div class="fg">
        <div class="ff"><div class="fl">지역</div><input class="fi" id="inp-place" placeholder="해방촌"></div>
        <div class="ff"><div class="fl">잼컨</div><input class="fi" id="inp-placeArea" placeholder="와일드덕칸틴 낮와인"></div>
      </div>
    </div>
  </div>
</div>

<script>
const MO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const DW=['일','월','화','수','목','금','토'];
const SK='lm_v3';

let S={
  profiles:[
    {id:1,name:'서영',emoji:'🍒',addr:'용산'},
    {id:2,name:'소연',emoji:'🌼',addr:'강남'},
    {id:3,name:'지영',emoji:'🎱',addr:'잠실'},
    {id:4,name:'지수',emoji:'🍟',addr:'용산'},
  ],
  votes:{},proposals:[],activeMember:null,
  currentMonth:new Date().getMonth(),
  currentYear:new Date().getFullYear(),
  confirmedDate:null,confirmedDateKey:null,confirmedPlace:null,
};

function g(id){return document.getElementById(id);}
function save(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}
function load(){
  try{
    var r=localStorage.getItem(SK);if(!r)return;
    var p=JSON.parse(r);if(!p||typeof p!=='object')return;
    S={
      profiles:Array.isArray(p.profiles)?p.profiles:S.profiles,
      votes:p.votes&&typeof p.votes==='object'?p.votes:{},
      proposals:Array.isArray(p.proposals)?p.proposals:[],
      activeMember:p.activeMember||null,
      currentMonth:Number.isInteger(p.currentMonth)?p.currentMonth:new Date().getMonth(),
      currentYear:Number.isInteger(p.currentYear)?p.currentYear:new Date().getFullYear(),
      confirmedDate:p.confirmedDate||null,confirmedDateKey:p.confirmedDateKey||null,
      confirmedPlace:p.confirmedPlace&&typeof p.confirmedPlace==='object'?p.confirmedPlace:null,
    };
  }catch(e){}
}

function showPage(p){
  document.querySelectorAll('.page').forEach(function(el){el.classList.remove('active');});
  g('page-'+p).classList.add('active');
  renderBC(p);
  var a=g('navBtns');
  a.innerHTML=p==='home'
    ?'<button class="nb" onclick="showPage(\'profile\')">멤버</button><button class="nb red" onclick="openModal(\'addProfile\')">+ 추가</button>'
    :'';
  if(p==='home')renderAll();
  if(p==='place')renderProposals();
  if(p==='profile')renderProfiles();
}

function renderBC(p){
  var bc=g('breadcrumb');
  var cs=[{id:'home',label:'캘린더'}];
  if(p==='place')cs.push({id:'place',label:'장소 투표'});
  if(p==='profile')cs.push({id:'profile',label:'멤버'});
  if(cs.length<2){bc.innerHTML='';return;}
  bc.innerHTML=cs.map(function(c,i){
    return '<span class="bc-i'+(c.id===p?' on':'')+'" onclick="showPage(\''+c.id+'\')">'+c.label+'</span>'+(i<cs.length-1?'<span class="bc-s"> › </span>':'');
  }).join('');
}

function openModal(m){
  if(m==='addProfile'){g('inp-name').value='';g('inp-emoji').value='';g('inp-addr').value='';g('emojiPreview').textContent='😊';}
  if(m==='addPlace'){g('inp-place').value='';g('inp-placeArea').value='';}
  g('modal-'+m).classList.add('open');
}
function closeModal(m){g('modal-'+m).classList.remove('open');}
function updateEP(){g('emojiPreview').textContent=g('inp-emoji').value||'😊';}

function addProfile(){
  var n=(g('inp-name').value||'').trim();if(!n)return;
  S.profiles.push({id:Date.now(),name:n,emoji:(g('inp-emoji').value||'').trim()||'😊',addr:(g('inp-addr').value||'').trim()||'미입력'});
  save();closeModal('addProfile');renderProfiles();renderAll();
}
function addProposal(){
  var n=(g('inp-place').value||'').trim();if(!n)return;
  S.proposals.push({id:Date.now(),name:n,area:(g('inp-placeArea').value||'').trim()||'',voters:[]});
  save();closeModal('addPlace');renderProposals();
}
function deleteProfile(id,e){
  e.stopPropagation();
  S.profiles=S.profiles.filter(function(p){return p.id!==id;});
  if(S.activeMember===id)S.activeMember=null;
  save();renderProfiles();renderAll();
}
function deleteProposal(id,e){
  e.stopPropagation();
  S.proposals=S.proposals.filter(function(p){return p.id!==id;});
  save();renderProposals();
}

function renderProfiles(){
  var pl=g('profileList');pl.innerHTML='';
  if(!S.profiles.length){pl.innerHTML='<div class="le">아직 멤버가 없어요</div>';return;}
  S.profiles.forEach(function(p){
    var d=document.createElement('div');d.className='pr';
    d.innerHTML='<div class="pav">'+p.emoji+'</div><div class="pi"><div class="pn">'+p.name+'</div><div class="pa">'+p.addr+'</div></div><button class="pdel" onclick="deleteProfile('+p.id+',event)">✕</button>';
    pl.appendChild(d);
  });
}

function renderAll(){
  renderMembers();renderCalendar();renderVoteList();
  g('calLbl').textContent=MO[S.currentMonth]+' '+S.currentYear;
}

function renderMembers(){
  var row=g('membersRow');row.innerHTML='';
  S.profiles.forEach(function(p){
    var isA=S.activeMember===p.id;
    var d=document.createElement('div');d.className='mp'+(isA?' on':'');
    d.innerHTML='<div class="av">'+p.emoji+'</div><div class="mn">'+p.name+'</div>';
    d.onclick=function(){S.activeMember=isA?null:p.id;save();renderAll();};
    row.appendChild(d);
  });
  var ad=document.createElement('div');ad.className='madd';
  ad.innerHTML='<div class="madd-ic">+</div><div class="madd-n">추가</div>';
  ad.onclick=function(){openModal('addProfile');};
  row.appendChild(ad);
}

function renderCalendar(){
  var dr=g('dowRow');dr.innerHTML='';
  DW.forEach(function(d){var e=document.createElement('div');e.className='dow';e.textContent=d;dr.appendChild(e);});
  var dg=g('daysGrid');dg.innerHTML='';
  var first=new Date(S.currentYear,S.currentMonth,1).getDay();
  var total=new Date(S.currentYear,S.currentMonth+1,0).getDate();
  var today=new Date();
  for(var i=0;i<first;i++){var emp=document.createElement('div');emp.className='cc emp';dg.appendChild(emp);}
  for(var d=1;d<=total;d++){
    (function(day){
      var key=S.currentYear+'-'+(S.currentMonth+1)+'-'+day;
      var voters=S.votes[key]||[];
      var tp=S.profiles.length;
      var allV=tp>1&&voters.length===tp&&S.profiles.every(function(p){return voters.indexOf(p.id)>-1;});
      var pfx=S.confirmedPlace&&S.confirmedPlace.dateKey===key;
      var isT=today.getDate()===day&&today.getMonth()===S.currentMonth&&today.getFullYear()===S.currentYear;
      var el=document.createElement('div');
      el.className='cc'+(isT?' tod':'')+(allV&&!pfx?' all':'')+(pfx?' pf':'');
      var nw=document.createElement('div');nw.className='dnw';
      var ns=document.createElement('span');ns.className='dn';ns.textContent=day;nw.appendChild(ns);el.appendChild(nw);
      if(voters.length>0){
        var dr2=document.createElement('div');dr2.className='ddots';
        voters.forEach(function(vid){
          var pr=S.profiles.find(function(x){return x.id===vid;});
          if(pr){var s=document.createElement('span');s.className='ddot';s.textContent=pr.emoji;dr2.appendChild(s);}
        });
        el.appendChild(dr2);
      }
      if(pfx&&S.confirmedPlace.name){
        var pt=document.createElement('div');pt.className='ptag';pt.textContent=S.confirmedPlace.name;el.appendChild(pt);
      }
      el.onclick=function(){
        if(!S.activeMember)return;
        var id=S.activeMember;
        if(!S.votes[key])S.votes[key]=[];
        var idx=S.votes[key].indexOf(id);
        if(idx>-1)S.votes[key].splice(idx,1);else S.votes[key].push(id);
        save();renderAll();
      };
      dg.appendChild(el);
    })(d);
  }
}

function renderVoteList(){
  var list=g('voteList');list.innerHTML='';
  var entries=[];
  for(var k in S.votes){if(S.votes[k]&&S.votes[k].length>0)entries.push(k);}
  entries.sort();
  var tp=S.profiles.length;
  var thr=Math.max(2,Math.ceil(tp*.5));
  var filtered=entries.filter(function(ek){return (S.votes[ek]||[]).length>=thr;});
  if(!filtered.length){list.innerHTML='<div class="le">멤버 선택 후 가능한 날짜를 탭하세요</div>';return;}
  filtered.forEach(function(k){
    var voters=S.votes[k]||[];
    var pts=k.split('-');var mI=parseInt(pts[1],10)-1;var d=pts[2];var yr=pts[0];
    var allV=tp>1&&voters.length===tp&&S.profiles.every(function(p){return voters.indexOf(p.id)>-1;});
    var pf=S.confirmedPlace&&S.confirmedPlace.dateKey===k;
    var ejs=voters.map(function(v){var p=S.profiles.find(function(x){return x.id===v;});return p?'<span>'+p.emoji+'</span>':'';}).join('');
    var bdg=pf?'<span class="bdg bp">장소 확정</span>':allV?'<span class="bdg bg">전원 가능</span>':'<span class="bdg br">'+voters.length+'명</span>';
    var row=document.createElement('div');row.className='lr';
    row.innerHTML='<div class="li '+(allV||pf?'ig':'ib')+'">'+(allV?'✓':'📅')+'</div><div class="lm"><div class="lt">'+(mI+1)+'월 '+d+'일</div><div class="ls">'+voters.length+'/'+tp+'명'+(pf?' · '+S.confirmedPlace.name:'')+'</div></div><div class="lr-r"><div class="ejs">'+ejs+'</div>'+bdg+'<span class="cv">›</span></div>';
    (function(cy,cm,cd){
      row.onclick=function(){
        S.confirmedDate=cy+'년 '+(cm+1)+'월 '+cd+'일';
        S.confirmedDateKey=cy+'-'+(cm+1)+'-'+cd;
        save();g('cdtLbl').textContent=S.confirmedDate;showPage('place');
      };
    })(yr,mI,d);
    list.appendChild(row);
  });
}

function renderProposals(){
  var pl=g('proposalsList');pl.innerHTML='';
  if(!S.proposals.length){pl.innerHTML='<div class="le">아직 제안된 장소가 없어요</div>';return;}
  var sorted=S.proposals.slice().sort(function(a,b){return b.voters.length-a.voters.length;});
  sorted.forEach(function(p,i){
    var myId=S.activeMember||(S.profiles[0]?S.profiles[0].id:1);
    var hV=p.voters.indexOf(myId)>-1;
    var isC=S.confirmedPlace&&S.confirmedPlace.proposalId===p.id&&S.confirmedPlace.dateKey===S.confirmedDateKey;
    var ejs=p.voters.map(function(v){var m=S.profiles.find(function(x){return x.id===v;});return m?'<span>'+m.emoji+'</span>':'';}).join('');
    var ic=isC?'ip':i===0&&p.voters.length>0?'ig':'ib';
    var ich=isC?'★':i===0&&p.voters.length>0?'1위':'📍';
    var row=document.createElement('div');row.className='lr';
    row.innerHTML=
      '<div class="li '+ic+'">'+ich+'</div>'+
      '<div class="lm"><div class="lt">'+p.name+'</div><div class="ls">'+(p.area||'')+(ejs?' · '+ejs:'')+'</div></div>'+
      '<div class="lr-r">'+
        (isC?'<span class="bdg bp">확정</span>':'')+
        '<button class="ab" onclick="votePlace('+p.id+',event)" style="background:'+(hV?'var(--pk)':'var(--s3)')+';color:'+(hV?'#fff':'var(--blue)')+';">'+(hV?'투표됨':'투표')+'</button>'+
        '<button class="ab" onclick="confirmPlace('+p.id+',event)" style="background:var(--s3);color:var(--purple);">확정</button>'+
        '<button class="ab" onclick="deleteProposal('+p.id+',event)" style="background:var(--s3);color:var(--lbl3);">✕</button>'+
      '</div>';
    pl.appendChild(row);
  });
}

function votePlace(id,e){
  e.stopPropagation();
  var p=S.proposals.find(function(x){return x.id===id;});if(!p)return;
  var myId=S.activeMember||(S.profiles[0]?S.profiles[0].id:1);
  var i=p.voters.indexOf(myId);
  if(i>-1)p.voters.splice(i,1);else p.voters.push(myId);
  save();renderProposals();
}

function confirmPlace(id,e){
  e.stopPropagation();if(!S.confirmedDateKey)return;
  var p=S.proposals.find(function(x){return x.id===id;});if(!p)return;
  S.confirmedPlace={dateKey:S.confirmedDateKey,proposalId:p.id,name:p.name,area:p.area};
  save();renderProposals();renderAll();
}

function changeMonth(dir){
  S.currentMonth+=dir;
  if(S.currentMonth>11){S.currentMonth=0;S.currentYear++;}
  if(S.currentMonth<0){S.currentMonth=11;S.currentYear--;}
  save();renderAll();
}

load();renderBC('home');renderAll();
</script>
</body>
</html>
