<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>언제만날래</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pk:#FF4FA0;--pk2:#D4006E;--pk-lt:#FFF0F8;--pk-md:#FFB3D9;
  --yw:#FFE135;--yw2:#C8A800;
  --bg:#FFF5FB;--white:#FFFFFF;--dark:#1A1A1A;--mid:#888;--light:#CCC;--border:#FFD6EC;
  --r:16px;--r-sm:10px;
  --f-title:'Gaegu',cursive;
  --f-body:'Gaegu',cursive;
}
body{background:var(--bg);font-family:var(--f-body);color:var(--dark);min-height:100vh;display:flex;justify-content:center}
.app{max-width:430px;width:100%;min-height:100vh;background:var(--white);display:flex;flex-direction:column;overflow:hidden;position:relative}

.header{background:var(--pk);padding:18px 20px 0}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{
  font-family:var(--f-title);
  font-size:46px;
  color:#C8FF57;
  letter-spacing:1px;
  paint-order:stroke fill;
  text-shadow:none;
}
.logo span{
  font-family:var(--f-title);
  color:#C8FF57;
  paint-order:stroke fill;
  text-shadow:none;
}
.hdr-btns{display:flex;gap:7px}
.hdr-btn{height:30px;padding:0 13px;border:2px solid rgba(255,255,255,.7);background:transparent;border-radius:20px;font-size:12px;font-family:var(--f-body);font-weight:800;cursor:pointer;color:var(--white);transition:.15s}
.hdr-btn:hover{background:var(--white);color:var(--pk)}
.breadcrumb{display:flex;align-items:center;gap:6px;padding:6px 0 0;white-space:nowrap}
.bc-item{font-size:12px;font-weight:700;color:rgba(255,255,255,.6);cursor:pointer;font-family:var(--f-body)}
.bc-item:hover,.bc-item.active{color:var(--white)}
.bc-sep{font-size:12px;color:rgba(255,255,255,.4)}
.header-wave{height:16px;background:var(--white);border-radius:16px 16px 0 0;margin-top:10px}

.page{display:none;flex:1;overflow-y:auto;padding:16px 16px 30px}
.page.active{display:block}

.sec-title{font-family:var(--f-title);font-size:24px;color:var(--pk);margin-bottom:3px;letter-spacing:.5px}
.sec-hint{font-size:13px;color:var(--mid);margin-bottom:14px;font-family:var(--f-body)}

.members-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.member-chip{display:flex;align-items:center;gap:6px;padding:6px 13px 6px 9px;border:2px solid var(--border);border-radius:30px;cursor:pointer;transition:.15s;background:var(--white)}
.member-chip:hover{border-color:var(--pk-md)}
.member-chip.active{border-color:var(--pk);background:var(--pk-lt)}
.chip-emoji{font-size:17px;line-height:1}
.chip-name{font-size:12px;font-weight:700;color:var(--mid);font-family:var(--f-body)}
.member-chip.active .chip-name{color:var(--pk2);font-weight:900}
.add-chip{padding:6px 13px;border:2px dashed var(--border);border-radius:30px;cursor:pointer;font-size:12px;font-weight:700;color:var(--light);transition:.15s;background:var(--white);font-family:var(--f-body)}
.add-chip:hover{border-color:var(--pk);color:var(--pk)}

.cal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-month{font-family:var(--f-title);font-size:26px;color:var(--dark);letter-spacing:.3px}
.cal-nav button{width:30px;height:30px;border:2px solid var(--border);background:var(--white);border-radius:50%;font-size:14px;cursor:pointer;transition:.15s;color:var(--pk);font-weight:900;margin-left:5px}
.cal-nav button:hover{background:var(--pk);border-color:var(--pk);color:var(--white)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{font-size:10px;font-weight:900;text-align:center;padding:5px 0;color:var(--light);font-family:var(--f-body);letter-spacing:.3px}
.cal-day{display:flex;flex-direction:column;align-items:center;padding:8px 2px 6px;cursor:pointer;border-radius:10px;transition:.12s;border:2px solid transparent;min-height:72px}
.cal-day:hover:not(.empty){background:var(--pk-lt);border-color:var(--pk-md)}
.cal-day.today .day-num-wrap{background:var(--pk);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.cal-day.today .day-num{color:var(--white)}
.cal-day.all-avail{background:var(--yw);border-color:var(--yw2)}
.cal-day.empty{cursor:default}
.day-num-wrap{display:flex;align-items:center;justify-content:center;min-width:22px;min-height:22px}
.day-num{font-size:12px;font-weight:900;color:var(--dark);font-family:var(--f-body);line-height:1}
.day-emojis{display:flex;flex-wrap:wrap;justify-content:center;gap:1px;margin-top:3px;max-width:100%}
.day-emojis span{font-size:9px;line-height:1.1}

.vote-section{margin-top:16px;max-height:190px;overflow:auto}
.vote-sec-title{font-family:var(--f-title);font-size:18px;color:var(--pk);margin-bottom:10px;letter-spacing:.3px}
.vote-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border:2px solid var(--border);border-radius:var(--r);margin-bottom:7px;background:var(--white)}
.vote-row.clickable{cursor:pointer}
.vote-row.clickable:hover{border-color:var(--pk);background:var(--pk-lt)}
.vote-row.all-match{border-color:var(--yw2);background:var(--yw);cursor:pointer}
.vote-date{font-weight:900;font-size:14px;font-family:var(--f-body)}
.vote-sub{font-size:11px;color:var(--mid);margin-top:2px;font-family:var(--f-body)}
.vote-row.all-match .vote-sub{color:var(--pk2);font-weight:700}
.vote-meta{display:flex;align-items:center;gap:7px}
.vote-emojis{display:flex;gap:2px;font-size:15px}
.all-badge{font-size:11px;font-weight:900;padding:3px 9px;border-radius:20px;background:var(--pk);color:var(--white);font-family:var(--f-body);white-space:nowrap}
.empty-msg{text-align:center;padding:30px 20px;color:var(--light);font-size:13px;font-family:var(--f-body)}

.place-bar{background:var(--pk);color:var(--white);padding:13px 16px;border-radius:var(--r);margin-bottom:18px}
.place-bar-lbl{font-size:10px;font-weight:900;opacity:.75;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px;font-family:var(--f-body)}
.place-bar-date{font-family:var(--f-title);font-size:20px}
.back-btn{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:800;color:var(--pk);cursor:pointer;margin-bottom:16px;font-family:var(--f-body)}
.back-btn:hover{color:var(--pk2)}

.prop-card{border:2px solid var(--border);border-radius:var(--r);padding:13px 15px;margin-bottom:9px;background:var(--white);transition:.15s}
.prop-card.top{border-color:var(--pk);background:var(--pk-lt)}
.prop-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.prop-rank{font-size:10px;font-weight:900;color:var(--pk);margin-bottom:3px;font-family:var(--f-body);letter-spacing:.5px;text-transform:uppercase}
.prop-name{font-family:var(--f-title);font-size:17px;color:var(--dark);margin-bottom:3px}
.prop-area{font-size:12px;color:var(--mid);margin-bottom:8px;font-family:var(--f-body)}
.prop-voters{font-size:16px;min-height:20px;margin-bottom:9px}
.prop-del{width:23px;height:23px;border:2px solid var(--border);border-radius:50%;background:var(--white);display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;color:var(--light);transition:.15s;flex-shrink:0}
.prop-del:hover{border-color:#FF5C5C;color:#FF5C5C}
.pvote-btn{width:100%;padding:9px;border:2px solid var(--pk);background:var(--white);border-radius:30px;font-family:var(--f-body);font-size:13px;font-weight:900;cursor:pointer;color:var(--pk);transition:.15s}
.pvote-btn:hover,.pvote-btn.voted{background:var(--pk);color:var(--white)}
.add-btn-dashed{width:100%;padding:11px;border:2px dashed var(--pk-md);background:var(--pk-lt);border-radius:var(--r);font-family:var(--f-body);font-size:13px;font-weight:900;cursor:pointer;color:var(--pk);transition:.15s}
.add-btn-dashed:hover{background:var(--pk);color:var(--white)}

.prof-card{border:2px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:9px;display:flex;align-items:center;gap:12px;position:relative;background:var(--white);transition:.15s}
.prof-card:hover{border-color:var(--pk-md)}
.prof-emo{font-size:28px;width:48px;height:48px;border:2px solid var(--border);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;background:var(--pk-lt);flex-shrink:0}
.prof-name{font-family:var(--f-title);font-size:16px;color:var(--dark);margin-bottom:1px}
.prof-addr{font-size:12px;color:var(--mid);font-family:var(--f-body)}
.prof-del{position:absolute;right:11px;top:11px;width:23px;height:23px;border:2px solid var(--border);border-radius:50%;background:var(--white);display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;color:var(--light);transition:.15s}
.prof-del:hover{border-color:#FF5C5C;color:#FF5C5C}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:100;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--white);width:100%;max-width:430px;max-height:90vh;overflow-y:auto;border-radius:22px 22px 0 0;border-top:3px solid var(--pk)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:2px solid var(--border)}
.modal-title{font-family:var(--f-title);font-size:20px;color:var(--pk)}
.modal-x{width:28px;height:28px;border:2px solid var(--border);background:var(--white);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--mid)}
.modal-x:hover{border-color:var(--pk);color:var(--pk)}
.modal-body{padding:16px 18px}
.f-lbl{font-size:11px;font-weight:900;color:var(--mid);margin-bottom:5px;display:block;letter-spacing:.6px;text-transform:uppercase;font-family:var(--f-body)}
.f-inp{width:100%;border:2px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;font-size:14px;font-family:var(--f-body);outline:none;background:var(--white);margin-bottom:13px;transition:.15s}
.f-inp:focus{border-color:var(--pk)}
.f-submit{width:100%;padding:11px;background:var(--pk);color:var(--white);border:none;border-radius:30px;font-family:var(--f-body);font-size:15px;font-weight:900;cursor:pointer;transition:.15s}
.f-submit:hover{background:var(--pk2)}
.emoji-input-row{display:flex;gap:10px;align-items:center;margin-bottom:6px}
.emoji-preview{width:52px;height:52px;border:2px solid var(--border);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:28px;background:var(--pk-lt);flex-shrink:0}
.emoji-text-inp{flex:1;border:2px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;font-size:22px;font-family:var(--f-body);outline:none;background:var(--white);transition:.15s}
.emoji-text-inp:focus{border-color:var(--pk)}
.emoji-hint{font-size:11px;color:var(--mid);font-family:var(--f-body);margin-bottom:13px}
.meet-chip{display:flex;align-items:center;gap:7px;padding:7px 12px;border:2px solid var(--border);border-radius:20px;cursor:pointer;transition:.15s;font-family:var(--f-body);font-size:13px;font-weight:700}
.meet-chip:hover,.meet-chip.sel{border-color:var(--pk);background:var(--pk-lt);color:var(--pk2)}
</style>
</head>
<body>
<div class="app" id="appRoot">
  <div class="header">
    <div class="header-top">
      <div class="logo">언제만날래</div>
      <div class="hdr-btns">
        <button class="hdr-btn" onclick="showPage('profile')">멤버</button>
        <button class="hdr-btn" onclick="openModal('addProfile')">+ 추가</button>
      </div>
    </div>
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="header-wave"></div>
  </div>

  <div class="page active" id="page-home">
    <div class="members-row" id="membersRow"></div>
    <div class="cal-top">
      <div class="cal-month" id="calMonthLabel"></div>
      <div class="cal-nav">
        <button onclick="changeMonth(-1)">&#8592;</button>
        <button onclick="changeMonth(1)">&#8594;</button>
      </div>
    </div>
    <div class="cal-grid" id="calDowRow"></div>
    <div class="cal-grid" id="calDays"></div>
    <div class="vote-section">
      <div class="vote-sec-title">투표 현황</div>
      <div id="voteList"></div>
    </div>
  </div>

  <div class="page" id="page-place">
    <div class="back-btn" onclick="showPage('home')">&#8592; 캘린더로</div>
    <div class="place-bar">
      <div class="place-bar-lbl">Confirmed Date</div>
      <div class="place-bar-date" id="confirmedDateLabel">—</div>
    </div>
    <div class="sec-title">어디서 만날까?</div>
    <div class="sec-hint">예시 장소 없이 제안만 받을 수 있어요.</div>
    <button class="add-btn-dashed" onclick="openModal('addPlace')">+ 접선 장소 제안</button>
  </div>

  <div class="page" id="page-profile">
    <div class="back-btn" onclick="showPage('home')">&#8592; 캘린더로</div>
    <div class="sec-title">멤버 관리</div>
    <div id="profileList"></div>
    <button class="add-btn-dashed" onclick="openModal('addProfile')">+ 멤버 추가</button>
  </div>
</div>

<!-- MODALS (outside .app so fixed positioning works on desktop) -->
<div class="modal-overlay" id="modal-addProfile">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title">멤버 추가</span>
      <button class="modal-x" onclick="closeModal('addProfile')">&#10005;</button>
    </div>
    <div class="modal-body">
      <label class="f-lbl">이름</label>
      <input class="f-inp" id="inp-name" placeholder="이름 입력">
      <label class="f-lbl">이모지 (직접 입력)</label>
      <div class="emoji-input-row">
        <div class="emoji-preview" id="emojiPreview">😊</div>
        <input class="emoji-text-inp" id="inp-emoji" maxlength="2" placeholder="😊" oninput="updateEmojiPreview()">
      </div>
      <div class="emoji-hint">이모지를 직접 붙여넣거나 키보드에서 선택하세요</div>
      <label class="f-lbl">지역</label>
      <input class="f-inp" id="inp-addr" placeholder="예: 대구 수성구">
      <button class="f-submit" onclick="addProfile()">추가!</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-addPlace">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title">장소 제안</span>
      <button class="modal-x" onclick="closeModal('addPlace')">&#10005;</button>
    </div>
    <div class="modal-body">
      <label class="f-lbl">지역</label>
      <input class="f-inp" id="inp-place" placeholder="예: 대구 중구">
      <label class="f-lbl">잼컨</label>
      <input class="f-inp" id="inp-placeArea" placeholder="예: 카페 온도">
      <button class="f-submit" onclick="addProposal()">제안!</button>
    </div>
  </div>
</div>

<script>
const MONTHS_KO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const MONTHS_EN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOWS=['일','월','화','수','목','금','토'];

let state={
  profiles:[
    {id:1,name:'서영',emoji:'🍒',addr:'용산'},
    {id:2,name:'소연',emoji:'🌼',addr:'강남'},
    {id:3,name:'지영',emoji:'🎱',addr:'잠실'},
    {id:4,name:'지수',emoji:'🍟',addr:'용산'},
  ],
  votes:{},
  proposals:[],
  activeMember:null,
  currentMonth:new Date().getMonth(),
  currentYear:new Date().getFullYear(),
  confirmedDate:null,
};

function gid(id){return document.getElementById(id);}

function showPage(p){
  document.querySelectorAll('.page').forEach(function(el){el.classList.remove('active');});
  gid('page-'+p).classList.add('active');
  renderBreadcrumb(p);
  if(p==='home')renderAll();
  if(p==='place')renderProposals();
  if(p==='profile')renderProfiles();
}

function renderBreadcrumb(p){
  var bc=gid('breadcrumb');
  var crumbs=[{id:'home',label:'캘린더'}];
  if(p==='place')crumbs.push({id:'place',label:'장소 투표'});
  if(p==='profile')crumbs.push({id:'profile',label:'멤버'});
  bc.innerHTML=crumbs.map(function(c,i){
    return '<span class="bc-item'+(c.id===p?' active':'')+'" onclick="showPage(\''+c.id+'\')">'+c.label+'</span>'+(i<crumbs.length-1?'<span class="bc-sep">›</span>':'');
  }).join('');
}

function openModal(m){
  if(m==='addProfile'){
    gid('inp-name').value='';
    gid('inp-emoji').value='';
    gid('inp-addr').value='';
    gid('emojiPreview').textContent='😊';
  }
  if(m==='addPlace'){gid('inp-place').value='';gid('inp-placeArea').value='';}
  gid('modal-'+m).classList.add('open');
}
function closeModal(m){gid('modal-'+m).classList.remove('open');}

function updateEmojiPreview(){
  var val=gid('inp-emoji').value;
  gid('emojiPreview').textContent=val||'😊';
}

function addProfile(){
  var n=(gid('inp-name').value||'').trim();
  var emojiRaw=(gid('inp-emoji').value||'').trim();
  var a=(gid('inp-addr').value||'').trim();
  if(!n)return;
  var emoji=emojiRaw||'😊';
  state.profiles.push({id:Date.now(),name:n,emoji:emoji,addr:a||'미입력'});
  closeModal('addProfile');
  renderProfiles();
  renderAll();
}

function addProposal(){
  var n=(gid('inp-place').value||'').trim();
  var a=(gid('inp-placeArea').value||'').trim();
  if(!n)return;
  state.proposals.push({id:Date.now(),name:n,area:a||'미정',voters:[]});
  closeModal('addPlace');
  renderProposals();
}

function deleteProfile(id,e){
  e.stopPropagation();
  state.profiles=state.profiles.filter(function(p){return p.id!==id;});
  if(state.activeMember===id)state.activeMember=null;
  renderProfiles();
  renderAll();
}

function renderProfiles(){
  var pl=gid('profileList');pl.innerHTML='';
  if(!state.profiles.length){pl.innerHTML='<div class="empty-msg">멤버가 없어요</div>';return;}
  state.profiles.forEach(function(p){
    var d=document.createElement('div');
    d.className='prof-card';
    d.innerHTML='<div class="prof-emo">'+p.emoji+'</div><div><div class="prof-name">'+p.name+'</div><div class="prof-addr">'+p.addr+'</div></div><div class="prof-del" onclick="deleteProfile('+p.id+',event)">&#10005;</div>';
    pl.appendChild(d);
  });
}

function renderAll(){
  renderMembers();
  renderCalendar();
  renderVoteList();
  gid('calMonthLabel').textContent=MONTHS_KO[state.currentMonth]+' '+state.currentYear;
}

function renderMembers(){
  var row=gid('membersRow');row.innerHTML='';
  state.profiles.forEach(function(p){
    var isActive=state.activeMember===p.id;
    var d=document.createElement('div');
    d.className='member-chip'+(isActive?' active':'');
    d.innerHTML='<span class="chip-emoji">'+p.emoji+'</span><span class="chip-name">'+p.name+'</span>';
    d.onclick=function(){state.activeMember=isActive?null:p.id;renderAll();};
    row.appendChild(d);
  });
  var add=document.createElement('div');
  add.className='add-chip';add.textContent='+ 추가';
  add.onclick=function(){openModal('addProfile');};
  row.appendChild(add);
}

function renderCalendar(){
  var dRow=gid('calDowRow');dRow.innerHTML='';
  DOWS.forEach(function(d){
    var el=document.createElement('div');el.className='cal-dow';el.textContent=d;dRow.appendChild(el);
  });
  var days=gid('calDays');days.innerHTML='';
  var first=new Date(state.currentYear,state.currentMonth,1).getDay();
  var total=new Date(state.currentYear,state.currentMonth+1,0).getDate();
  var today=new Date();
  for(var i=0;i<first;i++){
    var emp=document.createElement('div');emp.className='cal-day empty';days.appendChild(emp);
  }
  for(var d=1;d<=total;d++){
    (function(day){
      var key=state.currentYear+'-'+(state.currentMonth+1)+'-'+day;
      var voters=state.votes[key]||[];
      var totalP=state.profiles.length;
      var allVoted=totalP>1&&voters.length===totalP&&state.profiles.every(function(p){return voters.indexOf(p.id)>-1;});
      var isToday=today.getDate()===day&&today.getMonth()===state.currentMonth&&today.getFullYear()===state.currentYear;
      var el=document.createElement('div');
      el.className='cal-day'+(isToday?' today':'')+(allVoted?' all-avail':'');
      var numWrap=document.createElement('div');
      numWrap.className='day-num-wrap';
      var numSpan=document.createElement('span');
      numSpan.className='day-num';numSpan.textContent=day;
      numWrap.appendChild(numSpan);
      el.appendChild(numWrap);
      if(voters.length>0){
        var eRow=document.createElement('div');eRow.className='day-emojis';
        voters.forEach(function(vid){
          var pr=state.profiles.find(function(x){return x.id===vid;});
          if(pr){var s=document.createElement('span');s.textContent=pr.emoji;eRow.appendChild(s);}
        });
        el.appendChild(eRow);
      }
      el.onclick=function(){
        if(!state.activeMember)return;
        var id=state.activeMember;
        if(!state.votes[key])state.votes[key]=[];
        var idx=state.votes[key].indexOf(id);
        if(idx>-1)state.votes[key].splice(idx,1);else state.votes[key].push(id);
        renderAll();
      };
      days.appendChild(el);
    })(d);
  }
}

function renderVoteList(){
  var list=gid('voteList');list.innerHTML='';
  var entries=[];
  var k;
  for(k in state.votes){
    if(state.votes[k]&&state.votes[k].length>0)entries.push(k);
  }
  entries.sort();
  var totalP=state.profiles.length;
  var threshold=Math.ceil(totalP*0.5);
  var filteredEntries=entries.filter(function(entryKey){
    var voters=state.votes[entryKey]||[];
    return voters.length>=threshold;
  });
  if(!filteredEntries.length){
    list.innerHTML='<div class="empty-msg">전체 멤버의 50% 이상이 선택한 날짜만 표시돼요</div>';
    return;
  }
  filteredEntries.forEach(function(k){
    var voters=state.votes[k]||[];
    var parts=k.split('-');
    var mIdx=parseInt(parts[1],10)-1;
    var d=parts[2];
    var yr=parts[0];
    var allVoted=totalP>1&&voters.length===totalP&&state.profiles.every(function(p){return voters.indexOf(p.id)>-1;});
    var emojisHtml=voters.map(function(vid){
      var pr=state.profiles.find(function(x){return x.id===vid;});
      return pr?'<span style="font-size:15px">'+pr.emoji+'</span>':'';
    }).join('');
    var row=document.createElement('div');
    row.className='vote-row'+(allVoted?' all-match clickable':'');
    row.innerHTML='<div><div class="vote-date">'+(mIdx+1)+'월 '+d+'일</div><div class="vote-sub">'+voters.length+' / '+totalP+'명 가능'+(allVoted?' — 전원 OK!':'')+' </div></div><div class="vote-meta"><div class="vote-emojis">'+emojisHtml+'</div>'+(allVoted?'<span class="all-badge">전원 가능!</span><span style="font-size:16px;color:var(--pk2);font-weight:900">&#8594;</span>':'')+'</div>';
    if(allVoted){
      (function(capturedYr, capturedMIdx, capturedD){
        row.onclick=function(){
          state.confirmedDate=capturedYr+'년 '+(capturedMIdx+1)+'월 '+capturedD+'일';
          gid('confirmedDateLabel').textContent=state.confirmedDate;
          showPage('place');
        };
      })(yr, mIdx, d);
    }
    list.appendChild(row);
  });
}

function renderProposals(){
  var pl=gid('proposalsList');pl.innerHTML='';
  if(!state.proposals.length){
    pl.innerHTML='<div class="empty-msg">아직 제안된 접선 장소가 없어요</div>';
    return;
  }
  var sorted=state.proposals.slice().sort(function(a,b){return b.voters.length-a.voters.length;});
  sorted.forEach(function(p,i){
    var isTop=i===0&&p.voters.length>0;
    var myId=state.activeMember||(state.profiles[0]?state.profiles[0].id:1);
    var hasVoted=p.voters.indexOf(myId)>-1;
    var voterEmojis=p.voters.map(function(vid){
      var m=state.profiles.find(function(x){return x.id===vid;});
      return m?'<span>'+m.emoji+'</span>':'';
    }).join('');
    var d=document.createElement('div');
    d.className='prop-card'+(isTop?' top':'');
    d.innerHTML=
      (isTop?'<div class="prop-rank">Top Pick</div>':'')+
      '<div class="prop-head"><div><div class="prop-name">'+p.name+'</div><div class="prop-area">'+p.area+'</div></div><button class="prop-del" onclick="deleteProposal('+p.id+',event)">&#10005;</button></div>'+
      '<div class="prop-voters">'+(voterEmojis||'<span style="color:var(--light);font-size:12px">아직 투표 없음</span>')+'</div>'+
      '<button class="pvote-btn'+(hasVoted?' voted':'')+'" onclick="votePlace('+p.id+',event)">'+(hasVoted?'투표 완료':'투표하기')+'</button>';
    pl.appendChild(d);
  });
}

function deleteProposal(id,e){
  e.stopPropagation();
  state.proposals=state.proposals.filter(function(p){return p.id!==id;});
  renderProposals();
}

function votePlace(id,e){
  e.stopPropagation();
  var p=state.proposals.find(function(x){return x.id===id;});
  if(!p)return;
  var myId=state.activeMember||(state.profiles[0]?state.profiles[0].id:1);
  var i=p.voters.indexOf(myId);
  if(i>-1)p.voters.splice(i,1);else p.voters.push(myId);
  renderProposals();
}

function changeMonth(dir){
  state.currentMonth+=dir;
  if(state.currentMonth>11){state.currentMonth=0;state.currentYear++;}
  if(state.currentMonth<0){state.currentMonth=11;state.currentYear--;}
  renderAll();
}

renderBreadcrumb('home');
renderAll();
</script>
</body>
</html>
